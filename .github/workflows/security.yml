name: Security Examination

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run secret scanner
        run: bash security/scan_secrets.sh

  check-permissions:
    name: Check File Permissions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run permission audit
        run: bash security/check_permissions.sh

  audit-contents:
    name: Audit File Contents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run content audit
        run: bash security/audit_contents.sh

  check-git-history:
    name: Scan Git History
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run git history check
        run: bash security/check_git_history.sh

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run dependency audit
        run: bash security/dependency_audit.sh

  check-workflows:
    name: Audit GitHub Actions Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run workflow audit
        run: bash security/check_workflows.sh

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - scan-secrets
      - check-permissions
      - audit-contents
      - check-git-history
      - dependency-audit
      - check-workflows
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run full security suite and save report
        run: |
          bash security/run_all_checks.sh --report /tmp/security_report.txt || true
          cat /tmp/security_report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        if: always()
        with:
          name: security-report
          path: /tmp/security_report.txt
          retention-days: 30
